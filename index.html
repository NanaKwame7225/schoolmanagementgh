<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchoolManagement GH — Smart School Fees Management for Ghana</title>
<link href="https://fonts.googleapis.com/css2?family=Clash+Display:wght@400;500;600;700&family=Cabinet+Grotesk:wght@400;500;700;800&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --black: #080C0A; --green: #00C566; --green-dark: #009E52;
  --green-light: #E6FFF3; --gold: #F5A623; --white: #FAFFF9;
  --grey: #F0F5F2; --text: #1A2E24; --text2: #4A6358;
  --text3: #8AA898; --border: #D4E8DC;
}
html { scroll-behavior: smooth; }
body { font-family: 'Cabinet Grotesk', sans-serif; background: var(--white); color: var(--text); overflow-x: hidden; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 16px 40px; display: flex; align-items: center; justify-content: space-between;
  background: rgba(250,255,249,0.9); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.nav-logo { display: flex; align-items: center; gap: 10px; font-family: 'Clash Display', sans-serif; font-size: 20px; font-weight: 700; }
.nav-logo .dot { width: 10px; height: 10px; background: var(--green); border-radius: 50%; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.5);opacity:0.6} }
.nav-links { display: flex; align-items: center; gap: 32px; list-style: none; }
.nav-links a { text-decoration: none; color: var(--text2); font-size: 14px; font-weight: 500; transition: color 0.2s; }
.nav-links a:hover { color: var(--green); }
.nav-cta { background: var(--black); color: var(--white); padding: 10px 24px; border-radius: 100px; font-size: 14px; font-weight: 700; text-decoration: none; transition: all 0.2s; }
.nav-cta:hover { background: var(--green); transform: translateY(-1px); }

.hero { min-height: 100vh; padding: 120px 40px 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; position: relative; overflow: hidden; }
.hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,197,102,0.1) 0%, transparent 70%); }
.hero-badge { display: inline-flex; align-items: center; gap: 8px; background: var(--green-light); color: var(--green-dark); border: 1px solid rgba(0,197,102,0.3); padding: 6px 16px; border-radius: 100px; font-size: 13px; font-weight: 700; margin-bottom: 28px; animation: fadeUp 0.6s ease both; }
.hero h1 { font-family: 'Clash Display', sans-serif; font-size: clamp(40px, 7vw, 84px); font-weight: 700; line-height: 1.0; letter-spacing: -2px; max-width: 900px; animation: fadeUp 0.6s 0.1s ease both; }
.hero h1 em { font-style: italic; color: var(--green); font-family: 'Instrument Serif', serif; }
.hero p { font-size: clamp(16px, 2vw, 19px); color: var(--text2); max-width: 540px; line-height: 1.7; margin: 24px auto 40px; animation: fadeUp 0.6s 0.2s ease both; }
.hero-btns { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; animation: fadeUp 0.6s 0.3s ease both; }
.btn-primary { background: var(--black); color: var(--white); padding: 16px 36px; border-radius: 100px; font-size: 15px; font-weight: 800; text-decoration: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px; }
.btn-primary:hover { background: var(--green); transform: translateY(-2px); box-shadow: 0 12px 32px rgba(0,197,102,0.3); }
.btn-secondary { background: transparent; color: var(--text); padding: 16px 36px; border-radius: 100px; border: 2px solid var(--border); font-size: 15px; font-weight: 700; text-decoration: none; transition: all 0.2s; }
.btn-secondary:hover { border-color: var(--green); color: var(--green); }
.hero-stats { display: flex; gap: 48px; justify-content: center; flex-wrap: wrap; margin-top: 64px; padding-top: 48px; border-top: 1px solid var(--border); animation: fadeUp 0.6s 0.4s ease both; }
.stat { text-align: center; }
.stat-num { font-family: 'Clash Display', sans-serif; font-size: 34px; font-weight: 700; line-height: 1; }
.stat-label { font-size: 13px; color: var(--text3); margin-top: 4px; font-weight: 500; }

.section { padding: 100px 40px; max-width: 1200px; margin: 0 auto; }
.section-label { display: inline-block; font-size: 12px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--green); margin-bottom: 16px; }
.section-title { font-family: 'Clash Display', sans-serif; font-size: clamp(30px, 5vw, 52px); font-weight: 700; letter-spacing: -1px; line-height: 1.1; max-width: 640px; }
.section-title em { font-style: italic; font-family: 'Instrument Serif', serif; color: var(--green); }

.features-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 56px; }
.feature-card { background: var(--white); border: 1px solid var(--border); border-radius: 20px; padding: 32px; transition: all 0.3s; position: relative; overflow: hidden; }
.feature-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, var(--green), var(--gold)); opacity: 0; transition: opacity 0.3s; }
.feature-card:hover { transform: translateY(-4px); box-shadow: 0 20px 60px rgba(0,0,0,0.08); }
.feature-card:hover::before { opacity: 1; }
.feature-icon { width: 52px; height: 52px; background: var(--grey); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; margin-bottom: 20px; }
.feature-card h3 { font-family: 'Clash Display', sans-serif; font-size: 18px; font-weight: 600; margin-bottom: 10px; }
.feature-card p { font-size: 14px; color: var(--text2); line-height: 1.7; }

.how-section { background: var(--black); padding: 100px 40px; }
.how-inner { max-width: 1200px; margin: 0 auto; }
.how-section .section-label { color: var(--green); }
.how-section .section-title { color: var(--white); }
.steps-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 32px; margin-top: 56px; }
.step-num { font-family: 'Clash Display', sans-serif; font-size: 64px; font-weight: 700; color: rgba(255,255,255,0.05); line-height: 1; margin-bottom: -16px; }
.step-content { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 24px; }
.step-icon { font-size: 28px; margin-bottom: 14px; }
.step-content h3 { color: var(--white); font-size: 16px; font-weight: 700; margin-bottom: 8px; }
.step-content p { color: rgba(255,255,255,0.45); font-size: 13px; line-height: 1.7; }

.highlight-section { background: linear-gradient(135deg, #E6FFF3 0%, #F5FFFA 100%); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 100px 40px; }
.highlight-inner { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center; }
.highlight-text h2 { font-family: 'Clash Display', sans-serif; font-size: clamp(28px, 4vw, 44px); font-weight: 700; letter-spacing: -1px; line-height: 1.2; margin-bottom: 20px; }
.highlight-text p { font-size: 15px; color: var(--text2); line-height: 1.8; margin-bottom: 16px; }
.highlight-list { list-style: none; margin-top: 24px; }
.highlight-list li { display: flex; align-items: flex-start; gap: 12px; font-size: 15px; margin-bottom: 14px; }
.highlight-list li .check { width: 22px; height: 22px; flex-shrink: 0; background: var(--green); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 800; margin-top: 2px; }
.sms-mockup { background: var(--white); border-radius: 24px; padding: 28px; box-shadow: 0 24px 80px rgba(0,0,0,0.1); border: 1px solid var(--border); }
.sms-mockup-header { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; padding-bottom: 16px; border-bottom: 1px solid var(--border); }
.sms-avatar { width: 44px; height: 44px; background: var(--black); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--green); font-size: 16px; font-weight: 800; }
.sms-name { font-weight: 700; font-size: 14px; }
.sms-sub { font-size: 11px; color: var(--text3); }
.sms-bubble { background: var(--grey); border-radius: 4px 16px 16px 16px; padding: 12px 16px; font-size: 13px; line-height: 1.7; color: var(--text); margin-bottom: 8px; }
.sms-time { font-size: 11px; color: var(--text3); text-align: right; margin-bottom: 16px; }

.pricing-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 24px; margin-top: 56px; }
.pricing-card { border: 2px solid var(--border); border-radius: 24px; padding: 36px; position: relative; transition: all 0.3s; }
.pricing-card:hover { transform: translateY(-4px); box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
.pricing-card.featured { background: var(--black); border-color: var(--green); }
.popular-badge { position: absolute; top: -14px; left: 50%; transform: translateX(-50%); background: var(--green); color: var(--white); padding: 4px 16px; border-radius: 100px; font-size: 11px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }
.plan-name { font-family: 'Clash Display', sans-serif; font-size: 20px; font-weight: 700; margin-bottom: 8px; }
.pricing-card.featured .plan-name { color: var(--white); }
.plan-desc { font-size: 13px; color: var(--text3); margin-bottom: 24px; }
.pricing-card.featured .plan-desc { color: rgba(255,255,255,0.4); }
.plan-price { font-family: 'Clash Display', sans-serif; font-size: 48px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
.pricing-card.featured .plan-price { color: var(--white); }
.plan-price span { font-size: 18px; font-weight: 500; }
.plan-period { font-size: 13px; color: var(--text3); margin-bottom: 28px; }
.pricing-card.featured .plan-period { color: rgba(255,255,255,0.4); }
.plan-features { list-style: none; margin-bottom: 32px; }
.plan-features li { display: flex; align-items: center; gap: 10px; font-size: 14px; color: var(--text2); padding: 8px 0; border-bottom: 1px solid var(--border); }
.pricing
